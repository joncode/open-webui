apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaco
  namespace: jaco-stg
  annotations:
    # Cloudflare terminates TLS — Traefik only needs HTTP (port 80)
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: agent1-stg.manifest.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaco
                port:
                  number: 80
