apiVersion: v1
kind: ConfigMap
metadata:
  name: jaco-config
  namespace: jaco-stg
data:
  ENV: "prod"
  DEPLOY_ENV: "staging"
  PORT: "8080"
  DOCKER: "true"
  WEBUI_NAME: "Agent1 (QA)"

  # Morpheus API (OpenAI-compatible)
  OPENAI_API_BASE_URL: "https://api.mor.org/api/v1"

  # Disable Ollama (using external LLM APIs only)
  ENABLE_OLLAMA_API: "false"

  # Redis (in-cluster service)
  REDIS_URL: "redis://redis:6379"
  WEBSOCKET_MANAGER: "redis"
  ENABLE_WEBSOCKET_SUPPORT: "true"

  # Domain
  WEBUI_URL: "https://agent1-stg.manifest.network"
  CORS_ALLOW_ORIGIN: "https://agent1-stg.manifest.network"

  # Auth
  ENABLE_SIGNUP: "true"
  ENABLE_DIRECT_CONNECTIONS: "true"
  WEBUI_AUTH: "true"

  # Models — all users can see all models
  BYPASS_MODEL_ACCESS_CONTROL: "true"
  WEBUI_SESSION_COOKIE_SECURE: "true"
  WEBUI_SESSION_COOKIE_SAME_SITE: "lax"

  # Database (smaller pool per worker — PgBouncer handles multiplexing)
  ENABLE_DB_MIGRATIONS: "true"
  DATABASE_POOL_SIZE: "3"
  DATABASE_POOL_MAX_OVERFLOW: "2"
  DATABASE_POOL_RECYCLE: "1800"

  # Server
  UVICORN_WORKERS: "4"
  GLOBAL_LOG_LEVEL: "DEBUG"

  # Content Security Policy
  CONTENT_SECURITY_POLICY: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' https://fonts.gstatic.com https://api.fontshare.com; img-src 'self' data: blob:; connect-src 'self' https://api.mor.org wss://agent1-stg.manifest.network https://api.fontshare.com; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'"

  # Default model
  DEFAULT_MODELS: "venice-uncensored"

  # Privacy & telemetry
  ANONYMIZED_TELEMETRY: "false"
  SCARF_NO_ANALYTICS: "true"
  DO_NOT_TRACK: "true"
  ENABLE_VERSION_UPDATE_CHECK: "false"
  ENABLE_COMMUNITY_SHARING: "false"
  ENABLE_MESSAGE_RATING: "false"
  ENABLE_EVALUATION_ARENA_MODELS: "false"

  # Offline / no phone home
  OFFLINE_MODE: "true"
  HF_HUB_OFFLINE: "1"
  RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
  RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
  WHISPER_MODEL_AUTO_UPDATE: "false"
